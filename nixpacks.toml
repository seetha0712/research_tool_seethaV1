# Nixpacks configuration for Railway deployment

[phases.setup]
nixPkgs = ["python311", "nodejs-22_x"]

[phases.install]
cmds = [
    "cd backend && pip install --use-pep517 sgmllib3k==1.0.0",
    "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "npm ci",
    "npm run build"
]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
