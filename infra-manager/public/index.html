<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Tool - Infrastructure Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    /* Login Form */
    .login-card {
      max-width: 400px;
      margin: 80px auto;
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-success {
      background: #22c55e;
      color: #fff;
    }

    .btn-success:hover {
      background: #16a34a;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-sm {
      padding: 10px 16px;
      font-size: 0.9rem;
    }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .login-section.hidden { display: none; }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .dashboard-header h2 {
      font-size: 1.5rem;
    }

    .services-grid {
      display: grid;
      gap: 20px;
    }

    .service-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .service-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .service-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .service-icon.db { background: rgba(139, 92, 246, 0.2); }
    .service-icon.app { background: rgba(59, 130, 246, 0.2); }

    .service-name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .service-type {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .service-status {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-badge.running {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .status-badge.suspended {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .status-badge.loading {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    .status-badge.error {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Alert */
    .alert {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Confirmation Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    .modal p {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .last-updated {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Config warning */
    .config-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .config-warning h4 {
      color: #f59e0b;
      margin-bottom: 8px;
    }

    .config-warning p {
      color: #fcd34d;
      font-size: 0.9rem;
    }

    .config-warning code {
      display: block;
      margin-top: 12px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #fcd34d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Research Tool Infrastructure</h1>
      <p>Start and stop Render services</p>
    </div>

    <!-- Login Section -->
    <div class="login-section" id="loginSection">
      <div class="card login-card">
        <h2>Admin Login</h2>
        <div class="alert alert-error" id="loginError"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="password">Admin Password</label>
            <input type="password" id="password" placeholder="Enter admin password" required>
          </div>
          <button type="submit" class="btn btn-primary" id="loginBtn">
            <span>Sign In</span>
          </button>
        </form>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div class="dashboard" id="dashboard">
      <div class="card">
        <div class="dashboard-header">
          <h2>Services</h2>
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary btn-sm" id="refreshBtn">
              Refresh
            </button>
            <button class="btn btn-secondary btn-sm" id="logoutBtn">
              Logout
            </button>
          </div>
        </div>

        <div class="alert alert-error" id="dashboardError"></div>
        <div class="alert alert-success" id="dashboardSuccess"></div>

        <div id="configWarning" class="config-warning" style="display: none;">
          <h4>Configuration Required</h4>
          <p>Render API is not configured. Add these environment variables:</p>
          <code>
            RENDER_API_KEY=rnd_xxx<br>
            RENDER_SERVICE_ID_DB=dpg-xxx<br>
            RENDER_SERVICE_ID_APP=srv-xxx
          </code>
        </div>

        <div class="services-grid" id="servicesGrid">
          <!-- Services will be rendered here -->
        </div>

        <div class="last-updated" id="lastUpdated"></div>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3 id="modalTitle">Confirm Action</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let authToken = localStorage.getItem('infra_token');
    let pendingAction = null;

    // DOM Elements
    const loginSection = document.getElementById('loginSection');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');
    const dashboardError = document.getElementById('dashboardError');
    const dashboardSuccess = document.getElementById('dashboardSuccess');
    const servicesGrid = document.getElementById('servicesGrid');
    const lastUpdated = document.getElementById('lastUpdated');
    const refreshBtn = document.getElementById('refreshBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const configWarning = document.getElementById('configWarning');
    const confirmModal = document.getElementById('confirmModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalConfirm = document.getElementById('modalConfirm');
    const modalCancel = document.getElementById('modalCancel');

    // Check if already logged in
    if (authToken) {
      showDashboard();
      loadServices();
    }

    // Login form handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<div class="spinner"></div>';
      hideAlert(loginError);

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          authToken = data.token;
          localStorage.setItem('infra_token', authToken);
          showDashboard();
          loadServices();
        } else {
          showAlert(loginError, data.error || 'Login failed');
        }
      } catch (err) {
        showAlert(loginError, 'Network error. Please try again.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>Sign In</span>';
      }
    });

    // Logout handler
    logoutBtn.addEventListener('click', () => {
      authToken = null;
      localStorage.removeItem('infra_token');
      showLogin();
    });

    // Refresh handler
    refreshBtn.addEventListener('click', loadServices);

    // Modal handlers
    modalCancel.addEventListener('click', () => {
      confirmModal.classList.remove('show');
      pendingAction = null;
    });

    modalConfirm.addEventListener('click', async () => {
      if (!pendingAction) return;

      confirmModal.classList.remove('show');
      const { serviceKey, action } = pendingAction;
      pendingAction = null;

      await performAction(serviceKey, action);
    });

    function showLogin() {
      loginSection.classList.remove('hidden');
      dashboard.classList.remove('active');
    }

    function showDashboard() {
      loginSection.classList.add('hidden');
      dashboard.classList.add('active');
    }

    function showAlert(element, message) {
      element.textContent = message;
      element.classList.add('show');
    }

    function hideAlert(element) {
      element.classList.remove('show');
    }

    async function loadServices() {
      hideAlert(dashboardError);
      hideAlert(dashboardSuccess);
      servicesGrid.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="margin: 0 auto;"></div></div>';

      try {
        const res = await fetch(`${API_BASE}/services`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (res.status === 401) {
          authToken = null;
          localStorage.removeItem('infra_token');
          showLogin();
          return;
        }

        const data = await res.json();

        if (!data.configured) {
          configWarning.style.display = 'block';
        } else {
          configWarning.style.display = 'none';
        }

        renderServices(data.services || []);
        lastUpdated.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        showAlert(dashboardError, 'Failed to load services. Please try again.');
        servicesGrid.innerHTML = '';
      }
    }

    function renderServices(services) {
      servicesGrid.innerHTML = services.map(service => {
        const isDb = service.type === 'postgres';
        const statusClass = service.status === 'running' ? 'running' :
                           service.status === 'suspended' ? 'suspended' :
                           service.status === 'error' ? 'error' : 'loading';

        const statusText = service.status === 'running' ? 'Running' :
                          service.status === 'suspended' ? 'Suspended' :
                          service.status === 'not_configured' ? 'Not Configured' :
                          service.error ? 'Error' : 'Unknown';

        const actionBtn = service.configured && service.status !== 'not_configured' && !service.error
          ? (service.suspended
              ? `<button class="btn btn-success btn-sm" onclick="confirmAction('${service.key}', 'start', '${service.name}')">Start</button>`
              : `<button class="btn btn-danger btn-sm" onclick="confirmAction('${service.key}', 'stop', '${service.name}')">Stop</button>`)
          : '';

        return `
          <div class="service-card">
            <div class="service-info">
              <div class="service-icon ${isDb ? 'db' : 'app'}">
                ${isDb ? '🗄️' : '🌐'}
              </div>
              <div>
                <div class="service-name">${service.name}</div>
                <div class="service-type">${isDb ? 'PostgreSQL Database' : 'Web Service'}</div>
              </div>
            </div>
            <div class="service-status">
              <span class="status-badge ${statusClass}">
                <span class="status-dot"></span>
                ${statusText}
              </span>
              ${actionBtn}
            </div>
          </div>
        `;
      }).join('');
    }

    function confirmAction(serviceKey, action, serviceName) {
      pendingAction = { serviceKey, action };

      modalTitle.textContent = `${action === 'start' ? 'Start' : 'Stop'} Service?`;
      modalMessage.innerHTML = `Are you sure you want to ${action} <strong>${serviceName}</strong>?` +
        (action === 'stop' ? '<br><br><span style="color: #ef4444;">This will make the service unavailable.</span>' : '');

      modalConfirm.className = `btn ${action === 'start' ? 'btn-success' : 'btn-danger'}`;
      modalConfirm.textContent = action === 'start' ? 'Start Service' : 'Stop Service';

      confirmModal.classList.add('show');
    }

    async function performAction(serviceKey, action) {
      hideAlert(dashboardError);
      hideAlert(dashboardSuccess);

      // Show loading state on the button
      const buttons = servicesGrid.querySelectorAll('button');
      buttons.forEach(btn => btn.disabled = true);

      try {
        const res = await fetch(`${API_BASE}/${action}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ serviceKey })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          showAlert(dashboardSuccess, data.message);
          // Wait a moment then refresh
          setTimeout(loadServices, 2000);
        } else {
          showAlert(dashboardError, data.error || `Failed to ${action} service`);
          loadServices();
        }
      } catch (err) {
        showAlert(dashboardError, 'Network error. Please try again.');
        loadServices();
      }
    }

    // Auto-refresh every 30 seconds
    setInterval(() => {
      if (authToken && dashboard.classList.contains('active')) {
        loadServices();
      }
    }, 30000);
  </script>
</body>
</html>
