version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genai-backend
    ports:
      - "8000:8000"
    environment:
      # Load from backend/.env file
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERP_API_KEY=${SERP_API_KEY}
      - SLIDESGPT_API_KEY=${SLIDESGPT_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_BASE=${BACKEND_BASE:-http://localhost:8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      # Persist data directories
      - ./backend/genai.db:/app/genai.db
      - ./backend/uploads:/app/uploads
      - ./backend/output:/app/output
      - ./backend/static:/app/static
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - genai-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE=${REACT_APP_API_BASE:-http://localhost:8000}
    container_name: genai-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - genai-network

networks:
  genai-network:
    driver: bridge

volumes:
  # Named volumes for persistence (optional alternative to bind mounts)
  backend-data:
  chroma-data:
