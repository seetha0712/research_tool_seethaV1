services:
  - type: web
    name: research-tool-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://research-tool-seetha-v1.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: LOG_LEVEL
        value: INFO
      # Add these manually in Render dashboard:
      # - OPENAI_API_KEY
      # - TAVILY_API_KEY
      # - SERP_API_KEY
      # - SLIDESGPT_API_KEY
    healthCheckPath: /
